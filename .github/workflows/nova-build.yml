name: Nova PC - Windows Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM
        run: choco install llvm -y

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          cd C:\vcpkg
          .\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Install vcpkg dependencies
        run: |
          C:\vcpkg\vcpkg install --triplet x64-windows-static --x-manifest-with-copy
          C:\vcpkg\vcpkg install opus:x64-windows-static
          C:\vcpkg\vcpkg install libvpx:x64-windows-static
          C:\vcpkg\vcpkg install libwebm:x64-windows-static

      - name: Custom Branding (Name and Logo)
        run: |
          # RustDesk yazılarını senin isminle değiştirir
          powershell -Command "(Get-Content src/common.rs) -replace 'RustDesk', 'CloudForge Pro' | Set-Content src/common.rs"
          
          # Logosunu ve ikonunu senin yüklediğin görsellerle değiştirir
          if (Test-Path "cloudforge-logo.svg") {
            Copy-Item "cloudforge-logo.svg" "res/logo.svg" -Force
          }

      - name: Build
        env:
          VCPKG_ROOT: C:\vcpkg
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudForge-Pro-Windows
          path: target/release/*.exe
