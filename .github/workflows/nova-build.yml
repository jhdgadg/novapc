name: Nova PC - WhiteLabel Flutter Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows-flutter:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.x' # RustDesk'in uyumlu olduğu kararlı Flutter sürümü

      - name: Hard Rebranding (Kökten İsim ve Logo Temizliği)
        shell: pwsh
        run: |
          # 1. Flutter tarafındaki uygulama adını değiştirir
          if (Test-Path "flutter/pubspec.yaml") {
            (Get-Content flutter/pubspec.yaml) -replace 'name: rustdesk', 'name: cloudforge_pro' | Set-Content flutter/pubspec.yaml
          }
          
          # 2. Windows C++ pencerelerindeki ve başlıklarındaki tüm isimleri kazır
          Get-ChildItem -Recurse -Filter "*.rs" | ForEach-Object {
            (Get-Content $_.FullName) -replace 'RustDesk', 'CloudForge Pro' | Set-Content $_.FullName
          }
          Get-ChildItem -Recurse -Filter "*.dart" | ForEach-Object {
            (Get-Content $_.FullName) -replace 'RustDesk', 'CloudForge Pro' | Set-Content $_.FullName
          }

          # 3. Senin logon varsa arayüzdeki orijinal logoların üzerine zorla yazar
          if (Test-Path "cloudforge-logo.svg") {
            if (Test-Path "flutter/assets") {
              Copy-Item "cloudforge-logo.svg" "flutter/assets/logo.svg" -Force
            }
          }

      - name: Flutter Build Windows
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Package Output
        shell: pwsh
        run: |
          Compress-Archive -Path flutter/build/windows/x64/runner/Release/* -DestinationPath CloudForge-Pro-Windows.zip

      - name: Upload Finished Release
        uses: actions/upload-artifact@v4
        with:
          name: CloudForge-Pro-Custom
          path: CloudForge-Pro-Windows.zip
