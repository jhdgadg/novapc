name: Nova PC - WhiteLabel Flutter Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows-flutter:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Safe Rebranding (Nokta Atışı İsim ve Logo Değişimi)
        shell: pwsh
        run: |
          # 1. Windows pencere başlığını ve masaüstü adını değiştirir
          if (Test-Path "flutter/windows/runner/main.cpp") {
            (Get-Content flutter/windows/runner/main.cpp) -replace 'L"RustDesk"', 'L"CloudForge Pro"' | Set-Content flutter/windows/runner/main.cpp
          }
          
          # 2. Sadece ana dil ve string dosyalarındaki görünen isimleri değiştirir
          if (Test-Path "res/lang/en.txt") {
            (Get-Content res/lang/en.txt) -replace 'RustDesk', 'CloudForge Pro' | Set-Content res/lang/en.txt
          }
          if (Test-Path "res/lang/tr.txt") {
            (Get-Content res/lang/tr.txt) -replace 'RustDesk', 'CloudForge Pro' | Set-Content res/lang/tr.txt
          }
          if (Test-Path "src/common.rs") {
            (Get-Content src/common.rs) -replace 'APP_NAME = "RustDesk"', 'APP_NAME = "CloudForge Pro"' | Set-Content src/common.rs
          }

          # 3. Logonun üzerine zorla kendi logonuzu yazar
          if (Test-Path "cloudforge-logo.svg") {
            if (Test-Path "flutter/assets") {
              Copy-Item "cloudforge-logo.svg" "flutter/assets/logo.svg" -Force
            }
          }

      - name: Flutter Build Windows
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Package Output
        shell: pwsh
        run: |
          Compress-Archive -Path flutter/build/windows/x64/runner/Release/* -DestinationPath CloudForge-Pro-Windows.zip

      - name: Upload Finished Release
        uses: actions/upload-artifact@v4
        with:
          name: CloudForge-Pro-Custom
          path: CloudForge-Pro-Windows.zip
